<!DOCTYPE html>
<html lang="en-IE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — S&I Roofing Ltd</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to S&I Roofing Ltd homepage for professional roofing services in Ireland.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --brand-blue: #1E40AF;
      --brand-dark: #0F172A;
      --brand-white: #FFFFFF;
      --brand-blue-light: #3B82F6;
      --brand-blue-glow: rgba(30, 64, 175, 0.15);
      --brand-blue-subtle: rgba(59, 130, 246, 0.08);
    }

    body {
      font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
      background-color: var(--brand-dark);
      color: var(--brand-white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background effects */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 80vw;
      height: 80vw;
      background: radial-gradient(circle, var(--brand-blue-glow) 0%, transparent 70%);
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      right: -15%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(30, 64, 175, 0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: drift 10s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -30px) scale(1.05); }
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-code {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: clamp(7rem, 20vw, 12rem);
      line-height: 1;
      background: linear-gradient(135deg, var(--brand-blue-light) 0%, var(--brand-blue) 50%, #1e3a8a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.04em;
      position: relative;
      user-select: none;
      margin-bottom: 0.1em;
    }

    .error-code::after {
      content: '404';
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      font-size: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.12) 0%, transparent 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(12px);
      pointer-events: none;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--brand-blue), var(--brand-blue-light));
      border-radius: 2px;
      margin: 1.5rem auto;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: var(--brand-white);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .message {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.7;
      margin-bottom: 2.5rem;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9rem 2.2rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: var(--brand-white);
      background: linear-gradient(135deg, var(--brand-blue) 0%, var(--brand-blue-light) 100%);
      border: none;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px rgba(30, 64, 175, 0.3), 0 0 0 0 rgba(59, 130, 246, 0);
      position: relative;
      overflow: hidden;
    }

    .btn-home::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(30, 64, 175, 0.45), 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .btn-home:hover::before {
      opacity: 1;
    }

    .btn-home:active {
      transform: translateY(0);
    }

    .btn-home svg {
      width: 18px;
      height: 18px;
      transition: transform 0.3s ease;
    }

    .btn-home:hover svg {
      transform: translateX(-3px);
    }

    .brand-footer {
      margin-top: 3rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      .container {
        padding: 1.5rem;
      }

      .message {
        margin-bottom: 2rem;
      }

      .btn-home {
        padding: 0.85rem 1.8rem;
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="error-code" aria-hidden="true">404</div>
    <div class="divider"></div>
    <h1>Page Not Found</h1>
    <p class="message">
      Sorry, the page you're looking for doesn't exist or has been moved. 
      Let's get you back on track.
    </p>
    <a href="index.html" class="btn-home">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
      </svg>
      Back to Home
    </a>
    <p class="brand-footer">S&amp;I Roofing Ltd</p>
  </main>
</body>
</html>
